[alembic]
# Path to migration scripts.
script_location = src.database.migrations

# SQLAlchemy URL for the database to migrate.
# Override via environment variable: PLATE_GUARD_DATABASE_URL
sqlalchemy.url = sqlite:///%(here)s/../../data/plate_guard.db

# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
